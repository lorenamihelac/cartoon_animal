<!DOCTYPE html>
<html>
  <head>
    <title>AR Cartoon Animal on Bicycle</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">

  <a-assets>
    <a-asset-item id="animal-bike" src="assets/animal_on_bike.glb"></a-asset-item>
  </a-assets>

  <!-- Kamera -->
  <a-entity id="cameraRig" position="0 1.6 4">
    <a-camera wasd-controls-enabled="false"></a-camera>
  </a-entity>

  <!-- MODEL -->
 <!-- TEST OBJEKT -->
<a-box id="bikeModel" position="0 1 -3" color="red" class="clickable"></a-box>

  <!-- LEPŠA CESTA -->
  <a-plane position="0 0 -4" rotation="-90 0 0"
           width="10" height="100"
           color="#c2b280">
    
    <!-- sredinska črta -->
    <a-plane position="0 0.01 0" width="0.2" height="100" color="#ffffff"></a-plane>
  </a-plane>

  <!-- TRAVA -->
  <a-plane position="0 -0.01 -4" rotation="-90 0 0"
           width="30" height="100"
           color="#7ec850">
  </a-plane>

  <!-- SONCE -->
  <a-sphere position="-5 8 -10" radius="1.5" color="#FFD700"></a-sphere>

  <!-- OBLAKI -->
  <a-entity position="0 6 -10">
    <a-sphere radius="1" color="#fff"></a-sphere>
    <a-sphere position="1 0 0" radius="1.2" color="#fff"></a-sphere>
    <a-sphere position="-1 0 0" radius="1" color="#fff"></a-sphere>
  </a-entity>

  <!-- NEBO -->
  <a-sky color="#87CEEB"></a-sky>

      <a-text id="scoreText"
        value="Točke: 0"
        position="-1 2 -3"
        color="black"
        width="4">
</a-text>
</a-scene>

    <script src="script.js"></script>
  </body>
</html>
